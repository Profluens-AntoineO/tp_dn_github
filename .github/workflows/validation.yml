name: Pipeline CI/CD ÉcoShop Validation

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality-check:
    name: Contrôle Linter Syntaxique
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # This creates a temporary package environment and installs the required plugins
      - name: Préparer l'environnement des Linters
        run: |
          npm install -y
          

      # Validation HTML
      - name: Contrôle HTML
        run: npx htmlhint "**/*.html"

      # Validation CSS (Uncomment when you want to use it)
      #      - name: Contrôle CSS
      #        run: npx stylelint "**/*.css"

      # Validation JavaScript
      - name: Contrôle JavaScript
        run: npx eslint "**/*.js"

  perf-audit:
    name: Contrôle des Budgets WebPerf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Serveur local de simulation
        run: |
          python3 -m http.server 8080 &
          sleep 3
      - name: Vérification Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8080/index.html
          configPath: ./lighthouserc.json
          uploadArtifacts: true

  a11y-audit:
    name: Contrôle d'Accessibilité RGAA
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lancement du serveur éphémère local
        run: |
          python3 -m http.server 8080 &
          sleep 3

      - name: Exécution de l'audit automatisé Pa11y
        run: |
          npm install -g pa11y-ci
          pa11y-ci

  secret-scan:
    name: Détection de fuites de secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupère tout l'historique pour analyser tous les commits
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-audit:
    name: Audit des dépendances NPM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Analyse npm audit
        run: npm audit --audit-level=high

  unit-tests:
    name: Tests unitaires algorithmiques
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Exécution des tests
        run: npm test

  smoke-test:
    name: Test de fumée du serveur
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Démarrage du serveur et capture HTTP
        run: |
          python3 -m http.server 8080 &
          sleep 2
          curl --fail http://localhost:8080/index.html

  green-it-audit:
    name: Validation éco-conception EcoIndex
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Serveur temporaire
        run: |
          python3 -m http.server 8080 &
          sleep 2
      - name: Audit EcoIndex
        run: |
          npm install -g ecoindex-cli
          ecoindex-cli --url http://localhost:8080/index.html --budget-grade B

  e2e-testing:
    name: Tests de bout en bout Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Installation des navigateurs Playwright
        run: npx playwright install --with-deps
      - name: Exécution des scénarios E2E
        run: npx playwright test