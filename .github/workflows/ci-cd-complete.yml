name: Pipeline CI/CD ÉcoShop Intégral

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality-check:
    name: Contrôle Linter Syntaxique
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # Validation HTML (Vérifie les balises non fermées, les ID en double, les attributs manquants)
      - name: Contrôle HTML
        run: htmlhint "**/*.html"

      # Validation CSS (Détecte les erreurs de syntaxe et propriétés invalides)
#      - name: Contrôle CSS
#        run: npx stylelint "**/*.css"

      # Validation JavaScript (Détecte les variables non utilisées, les points-virgules manquants, la syntaxe cassée)
      - name: Contrôle JavaScript
        run: npx eslint "**/*.js"

  perf-audit:
    name: Contrôle des Budgets WebPerf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Serveur local de simulation
        run: |
          python3 -m http.server 8080 &
          sleep 3
      - name: Vérification Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8080/index.html
          budgetPath: ./lighthouse-budget.json
          uploadArtifacts: true