name: Pipeline CI/CD ÉcoShop Intégral

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  quality-check:
    name: Contrôle Linter Syntaxique
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # This creates a temporary package environment and installs the required plugins
      - name: Préparer l'environnement des Linters
        run: |
          npm install -y


      # Validation HTML
      - name: Contrôle HTML
        run: npx htmlhint "**/*.html"

      # Validation CSS (Uncomment when you want to use it)
      #      - name: Contrôle CSS
      #        run: npx stylelint "**/*.css"

      # Validation JavaScript
      - name: Contrôle JavaScript
        run: npx eslint "**/*.js"

  perf-audit:
    name: Contrôle des Budgets WebPerf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Serveur local de simulation
        run: |
          python3 -m http.server 8080 &
          sleep 3
      - name: Vérification Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8080/index.html
          configPath: ./lighthouserc.json
          uploadArtifacts: true

  # ==========================================
  # DÉPLOIEMENT TEST (GitHub Pages)
  # ==========================================
  deploy-to-staging:
    name: Déploiement Environnement Recette (GitHub Pages)
    runs-on: ubuntu-latest
    # 🛡️ SÉCURITÉ : Attend impérativement la réussite de la Qualité ET de la Perf
    needs: [quality-check, perf-audit]
    # 🎯 FILTRE : S'exécute uniquement lors d'un push sur la branche 'test'
    if: github.event_name == 'push' && github.ref == 'refs/heads/test'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Déploiement Staging
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./

  # ==========================================
  # DÉPLOIEMENT PROD (Serveur SFTP)
  # ==========================================
  deploy-to-production:
    name: Déploiement Production Souveraine (Alwaysdata)
    runs-on: ubuntu-latest
    # 🛡️ SÉCURITÉ : Attend impérativement la réussite de la Qualité ET de la Perf
    needs: [quality-check, perf-audit]
    # 🎯 FILTRE : S'exécute uniquement lors d'un push sur 'main' ou 'master'
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Nettoyage des dossiers de développement (.git, .github)
        run: rm -rf .git .github

      - name: Déploiement Production SFTP Sovereign
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_SERVER }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          local_path: './'      # Note le changement de nom du paramètre
          remote_path: './www/'
          ssh_private_key: ''