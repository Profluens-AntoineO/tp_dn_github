name: Pipeline CI/CD ÉcoShop Intégral

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality-check:
    name: Contrôle Linter Syntaxique
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Diagnostic Analytique
        run: |
          npm install -g htmlhint
          npm install --save-dev stylelint stylelint-config-standard eslint
          echo "module.exports = { extends: 'stylelint-config-standard' };" > .stylelintrc.js
          htmlhint "**/*.html"
          npx stylelint "**/*.css" --allow-empty-input
          npx eslint "**/*.js" --no-error-on-unmatched-pattern

  perf-audit:
    name: Contrôle des Budgets WebPerf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Serveur local de simulation
        run: |
          python3 -m http.server 8080 &
          sleep 3
      - name: Vérification Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8080/index.html
          budgetPath: ./lighthouse-budget.json
          uploadArtifacts: true